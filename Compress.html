<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="Compress.css">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script defer src="Compress.js"></script>
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    
</head>
<title>COMPRESS</title>
<header>
    Compressor website for PIR research purpose
</header>
<body onload="setup()">
    <h2> 
        <p>Import image: </p>
    </h2>

    <input id="fileid" type="file" name="filename" accept"image/*" hidden/>
    <input id='buttonid' type="button" value='Upload MB' />
    <img id="uploaded_image_id" alt="Uploaded image" hidden>
    <input id='submitid' type="submit" value="submit"/>
    <label for="new_width">New Width</label>
    <input type="number" id="new_width" value="250"/> 
    <label for="new_height">New Height</label>
    <input type="number" id="new_height" value="250"/> 
    <p> site connected to pyscript and pyenv I guess</p>

    <h2 id="output"> 
        <p>Result: </p>
    </h2>
    <script type="py" src="./simple_script.py">
    </script>
    <script type="py" src="./Compressor.py" config = "./pyscript.json">
    </script>
</body>
</html>
